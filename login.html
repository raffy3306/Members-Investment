<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Investment Withdrawal System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="login-container">
  <div class="login-card">

    <h2>Investment Withdraw System</h2>
    <p class="subtitle">Please login to continue.</p>
    <p class="login-note">Use your admin credentials to access the Admin Dashboard.</p>

    <label>Email Address</label>
    <input id="email" placeholder="you@email.com">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your password">

    <div class="login-options">
      <label><input type="checkbox"> Keep me signed in</label>
      <a href="#" onclick="openForgotPasswordModal(event)">Forgot password?</a>
    </div>

    <button class="btn blue" onclick="login()">Sign In →</button>

  </div>
</div>

<div id="forgotPasswordModal" class="modal">
  <div class="modal-content" style="width: 420px;">
    <div class="modal-header">
      <h3>Reset Password</h3>
      <button class="modal-close" onclick="closeForgotPasswordModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="forgotPasswordEmail">Email Address</label>
        <input id="forgotPasswordEmail" class="form-control" type="email" placeholder="you@email.com">
      </div>
      <p style="margin: 0; font-size: 13px; color: #6b7280;">
        Enter your account email and we will send password recovery instructions.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeForgotPasswordModal()">Cancel</button>
      <button class="btn blue" onclick="requestPasswordReset()">Send Reset Email</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
