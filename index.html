<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Investment Withdrawal System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <h2>Investment Withdraw System</h2>
    <p class="subtitle">Please login to continue.</p>
    <p class="login-note">Use your admin credentials to access the Admin Dashboard.</p>

    <label>Email Address</label>
    <input id="email" placeholder="you@email.com">

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter your password">

    <div class="login-options">
      <label><input type="checkbox"> Keep me signed in</label>
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn blue" onclick="login()">Sign In →</button>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
